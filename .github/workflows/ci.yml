name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ruff + smoke
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install
        env:
          PY_VERSION: ${{ matrix.python-version }}
        run: uv sync --frozen --extra dev --python "$PY_VERSION"

      - name: Lint with ruff
        run: uv run ruff check packages tests

      - name: Check formatting with ruff
        run: uv run ruff format --check packages tests

      - name: Run smoke tests
        run: uv run pytest tests/smoke -v
